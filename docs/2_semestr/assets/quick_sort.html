<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Sort — покрокова візуалізація</title>
  <link rel="stylesheet" href="sort_viz.css">
</head>
<body>
  <header><strong id="viz-title">Quick Sort</strong> — покроковий перегляд (лекція 21)</header>

  <div class="main">
    <section class="panel panel-code" aria-label="Код">
      <h2>Код (C++)</h2>
      <div class="code-wrap">
        <pre id="code"></pre>
      </div>
    </section>

    <section class="panel panel-array" aria-label="Масив">
      <div class="panel-array-head">
        <h2>Масив</h2>
        <span class="step-info" id="stepInfo" aria-live="polite">0 / 0</span>
      </div>
      <div class="array-viz-slot">
        <div class="array-viz" id="array"></div>
      </div>
    </section>
  </div>

  <footer>
    <div class="footer-body">
      <div class="footer-text-grid">
        <p class="step-caption" id="caption" aria-live="polite"></p>
        <p class="code-comment" id="codeComment" aria-live="polite"></p>
      </div>
      <div class="vars" id="vars"></div>
    </div>
    <div class="controls">
      <button type="button" id="btnReset" title="Новий випадковий масив">Скинути</button>
      <button type="button" id="btnPrev">← Назад</button>
      <button type="button" id="btnNext" class="primary">Далі →</button>
    </div>
  </footer>

  <script src="sort_viz.js"></script>
  <script src="quick_sort.js"></script>
</body>
</html>
